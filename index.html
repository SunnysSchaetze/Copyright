<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
    }

    .textbox {
      background-color: #ff7f00;
      color: white;
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
    }

    .copyright {
      font-size: 9px;
    }

    .hashtags {
      font-size: 9px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .hashtags span {
      display: inline;
    }

    /* Mobile Ansicht */
    @media (max-width: 768px) {
      .hashtags {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        white-space: normal;
        line-height: 1.2;
      }

      .hashtags span {
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="textbox">
    <div class="copyright">
      © 2026 Marcel Melzer - An- und Verkauf - Sunny's Schätze
    </div>

    <div class="hashtags">
      <span>#SunnysSchätze</span>
      <span>#SunnysSchätzeRiesa</span>
    </div>
  </div>

</body>
</html>
